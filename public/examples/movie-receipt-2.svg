<svg xmlns="http://www.w3.org/2000/svg" width="720" height="960" viewBox="0 0 720 960" fill="none">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#19241f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="720" height="960" fill="#f7f7f6"/>

  <g filter="url(#shadow)">
    <path d="M140 108h440a28 28 0 0 1 28 28v688a28 28 0 0 1-28 28H140a28 28 0 0 1-28-28V136a28 28 0 0 1 28-28Z" fill="url(#paper)" stroke="#b45309" stroke-opacity="0.22" stroke-width="2"/>
  </g>

  <g fill="#171412" opacity="0.86">
    <text x="360" y="168" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="900" text-anchor="middle" letter-spacing="2">PHOTO TICKET</text>
    <text x="360" y="196" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="650" text-anchor="middle" opacity="0.7">Movie Receipt</text>
  </g>

  <g>
    <rect x="180" y="224" width="360" height="300" rx="26" fill="#111827" fill-opacity="0.08" stroke="#171412" stroke-opacity="0.16"/>
    <g stroke="#171412" stroke-opacity="0.18" stroke-width="12" stroke-linecap="round">
      <path d="M230 300h260"/>
      <path d="M230 348h210" opacity="0.7"/>
      <path d="M230 396h150" opacity="0.55"/>
    </g>
    <g fill="#171412" opacity="0.65" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
      <text x="360" y="500" font-size="11" font-weight="800" text-anchor="middle">(poster/photo area)</text>
    </g>
  </g>

  <g stroke="#171412" stroke-opacity="0.18" stroke-width="2">
    <line x1="164" y1="560" x2="556" y2="560"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" fill="#171412">
    <text x="180" y="606" font-size="12" font-weight="800" opacity="0.6">TITLE</text>
    <text x="180" y="636" font-size="18" font-weight="900">Movie Title</text>
    <text x="180" y="662" font-size="13" font-weight="700" opacity="0.7">Original Title</text>

    <text x="180" y="710" font-size="12" font-weight="800" opacity="0.6">DATE</text>
    <text x="180" y="738" font-size="14" font-weight="750">2026-01-23</text>

    <text x="392" y="710" font-size="12" font-weight="800" opacity="0.6">SEAT</text>
    <text x="392" y="738" font-size="14" font-weight="750">C-07</text>
  </g>

  <g>
    <rect x="180" y="780" width="360" height="104" rx="22" fill="#ffffff" fill-opacity="0.72" stroke="#171412" stroke-opacity="0.18"/>
    <g fill="#171412" opacity="0.72" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
      <text x="204" y="814" font-size="11" font-weight="800">MEMO</text>
      <text x="204" y="840" font-size="12" font-weight="650">One line review goes here.</text>
      <text x="204" y="862" font-size="12" font-weight="650">Export as JPEG.</text>
